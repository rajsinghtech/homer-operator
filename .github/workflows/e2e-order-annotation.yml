name: E2E - Order Annotation

on:
  push:
    branches:
      - feat/order-annotation
  workflow_dispatch:

env:
  GO_VERSION: '1.26.3'

jobs:
  e2e:
    name: E2E Order Annotation Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: homer-test

      - name: Install Gateway API CRDs
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml

      - name: Install homer-operator CRDs
        run: make install

      - name: Start operator in background
        run: |
          ENABLE_GATEWAY_API=true go run ./cmd/main.go > /tmp/operator.log 2>&1 &
          echo "OPERATOR_PID=$!" >> $GITHUB_ENV

      - name: Create namespace and Dashboard
        run: |
          kubectl create namespace homer-test
          kubectl apply -f - <<'EOF'
          apiVersion: homer.rajsingh.info/v1alpha1
          kind: Dashboard
          metadata:
            name: homer
            namespace: homer-test
          spec:
            homerConfig:
              title: "Order Test Dashboard"
              header: true
            ingressSelector:
              matchLabels:
                homer-test: "true"
          EOF

      - name: Wait for operator to be ready
        run: |
          echo "Waiting for operator to create ConfigMap..."
          for i in $(seq 1 30); do
            kubectl get configmap homer-homer -n homer-test 2>/dev/null && break
            sleep 2
          done
          kubectl get configmap homer-homer -n homer-test

      - name: Create service-order Ingresses
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: svc-zebra
            namespace: homer-test
            labels:
              homer-test: "true"
            annotations:
              service.homer.rajsingh.info/name: "Zebra Service"
              service.homer.rajsingh.info/order: "1"
          spec:
            rules:
            - host: zebra.example.com
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service: {name: dummy, port: {number: 80}}
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: svc-mango
            namespace: homer-test
            labels:
              homer-test: "true"
            annotations:
              service.homer.rajsingh.info/name: "Mango Service"
              service.homer.rajsingh.info/order: "10"
          spec:
            rules:
            - host: mango.example.com
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service: {name: dummy, port: {number: 80}}
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: svc-apple
            namespace: homer-test
            labels:
              homer-test: "true"
            annotations:
              service.homer.rajsingh.info/name: "Apple Service"
              service.homer.rajsingh.info/order: "5"
          spec:
            rules:
            - host: apple.example.com
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service: {name: dummy, port: {number: 80}}
          EOF

      - name: Create item-order Ingresses
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: item-zebra
            namespace: homer-test
            labels:
              homer-test: "true"
            annotations:
              service.homer.rajsingh.info/name: "Fruits Group"
              item.homer.rajsingh.info/name: "Zebra App"
              item.homer.rajsingh.info/order: "1"
          spec:
            rules:
            - host: item-zebra.example.com
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service: {name: dummy, port: {number: 80}}
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: item-mango
            namespace: homer-test
            labels:
              homer-test: "true"
            annotations:
              service.homer.rajsingh.info/name: "Fruits Group"
              item.homer.rajsingh.info/name: "Mango App"
              item.homer.rajsingh.info/order: "10"
          spec:
            rules:
            - host: item-mango.example.com
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service: {name: dummy, port: {number: 80}}
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: item-apple
            namespace: homer-test
            labels:
              homer-test: "true"
            annotations:
              service.homer.rajsingh.info/name: "Fruits Group"
              item.homer.rajsingh.info/name: "Apple App"
              item.homer.rajsingh.info/order: "5"
          spec:
            rules:
            - host: item-apple.example.com
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service: {name: dummy, port: {number: 80}}
          EOF

      - name: Wait for reconciliation
        run: sleep 10

      - name: Verify order annotation
        run: |
          CONFIG=$(kubectl get configmap homer-homer -n homer-test -o jsonpath='{.data.config\.yml}')
          echo "$CONFIG"

          python3 - <<PYEOF
          import yaml, sys

          config = yaml.safe_load("""$CONFIG""")
          services = config.get("services", [])

          # Verify service group order: Mango(10) > Apple(5) > Zebra(1)
          target_names = {"Mango Service", "Apple Service", "Zebra Service"}
          ordered = [s["name"] for s in services if s.get("name") in target_names]
          expected = ["Mango Service", "Apple Service", "Zebra Service"]
          assert ordered == expected, f"[FAIL] Service order: expected {expected}, got {ordered}"
          print(f"[PASS] Service order: {ordered}")

          # Verify item order within Fruits Group: Mango App(10) > Apple App(5) > Zebra App(1)
          fruits = next((s for s in services if s.get("name") == "Fruits Group"), None)
          assert fruits is not None, "[FAIL] 'Fruits Group' service not found"
          item_names = [i["name"] for i in fruits.get("items", [])]
          expected_items = ["Mango App", "Apple App", "Zebra App"]
          assert item_names == expected_items, f"[FAIL] Item order: expected {expected_items}, got {item_names}"
          print(f"[PASS] Item order: {item_names}")

          print("All order annotation checks passed!")
          PYEOF

      - name: Print operator logs on failure
        if: failure()
        run: cat /tmp/operator.log
